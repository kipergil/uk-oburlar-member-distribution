
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UK Oburlar Member Distribution</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
html,body,#map{height:100%;margin:0;font-family:Arial,sans-serif}
#legend{
position:absolute;top:10px;right:10px;z-index:1000;
background:rgba(255,255,255,.96);
padding:8px 10px;border-radius:8px;
width:160px;max-height:85vh;overflow:auto;
box-shadow:0 4px 12px rgba(0,0,0,.25);
font-size:11px}
#legend-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:6px}
#legend h3{margin:0;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#legend-toggle{font-weight:bold;font-size:14px;line-height:1;padding:0 2px;user-select:none;flex:none}
#legend p{margin:4px 0 6px;color:#666;font-size:10px}
#legend.collapsed{width:auto}
#legend.collapsed #legend-body{display:none}
.item{display:flex;justify-content:space-between;align-items:center;margin:2px 0;gap:6px}
.left{display:flex;align-items:center;gap:6px}
.dot{width:9px;height:9px;border-radius:50%;flex:none}
.pin{
background:#c62828;color:#fff;border:2px solid #fff;
border-radius:18px;padding:2px 7px;font-weight:bold;
font-size:11px;box-shadow:0 2px 6px rgba(0,0,0,.4);
white-space:nowrap
}
.region-tooltip{
background:rgba(255,255,255,.9);border:none;box-shadow:0 1px 4px rgba(0,0,0,.3);
font-size:11px;padding:1px 6px;
}
.region-tooltip::before{display:none}
.leaflet-popup-content{font-size:13px}
</style>
</head>
<body>
<div id="legend">
<div id="legend-header">
<h3>🇬🇧 UK Members</h3>
<span id="legend-toggle">−</span>
</div>
<div id="legend-body">
<p>Total members: <b>129</b></p>
<div id="items"></div>
</div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const total=129;
const data=[
["London",51.5074,-0.1278,55],
["South East",51.27,-0.90,15],
["West Midlands",52.486,-1.89,13],
["North East",54.978,-1.617,9],
["South West",50.72,-3.53,9],
["East of England",52.24,0.90,7],
["North West",53.48,-2.24,6],
["Scotland",56.49,-4.20,5],
["East Midlands",52.95,-1.15,5],
["Northern Ireland",54.60,-6.65,2],
["Yorkshire & Humber",53.80,-1.55,2],
["Wales",52.13,-3.78,1]
];
function color(v){
 if(v>=40)return "#8B0000";
 if(v>=15)return "#d7301f";
 if(v>=10)return "#ef6548";
 if(v>=7)return "#fc8d59";
 if(v>=5)return "#fdbb84";
 return "#fee8c8";
}
const TOOLTIP_ZOOM_THRESHOLD=7;
const map=L.map("map").setView([54.4,-2.7],6);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap"}).addTo(map);
const legend=document.getElementById("items");
const markers=[];
data.forEach(r=>{
 legend.innerHTML+=`<div class="item"><div class="left"><span class="dot" style="background:${color(r[3])}"></span>${r[0]}</div><b>${r[3]}</b></div>`;
 const icon=L.divIcon({
   className:"",
   html:`<div class="pin">${r[3]}</div>`,
   iconSize:[36,24],
   iconAnchor:[18,12]
 });
 const m=L.marker([r[1],r[2]],{icon}).addTo(map);
 m.bindPopup(`<b>${r[0]}</b><br><b>${r[3]}</b> members<br>${(r[3]/total*100).toFixed(1)}%`);
 m.bindTooltip(r[0],{permanent:true,direction:"top",offset:[0,-18],className:"region-tooltip"});
 markers.push(m);
});

function updateTooltips(){
 const show=map.getZoom()>=TOOLTIP_ZOOM_THRESHOLD;
 markers.forEach(m=>{
   if(show)m.openTooltip();
   else m.closeTooltip();
 });
}
map.on("zoomend",updateTooltips);
updateTooltips();

const legendEl=document.getElementById("legend");
const legendToggle=document.getElementById("legend-toggle");
document.getElementById("legend-header").addEventListener("click",()=>{
 const collapsed=legendEl.classList.toggle("collapsed");
 legendToggle.textContent=collapsed?"+":"−";
});
</script>
</body>
</html>
